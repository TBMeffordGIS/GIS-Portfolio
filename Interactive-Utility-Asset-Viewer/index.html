<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Utility Asset Viewer</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Interactive Utility Asset Viewer</h1>

<p>
A Web GIS demonstration using Leaflet.js to visualize utility infrastructure assets and associated metadata.
</p>

</header>

<main>

<div id="control-panel">

    <h2>Asset Controls</h2>

    <label for="asset-type">Filter by Asset Type</label>

    <select id="asset-type">
        <option value="All">All Assets</option>
        <option value="Transformer">Transformers</option>
        <option value="Pole">Utility Poles</option>
        <option value="Hydrant">Fire Hydrants</option>
        <option value="Valve">Water Valves</option>
    </select>

</div>

<div id="map"></div>

</main>

<footer>

Interactive Utility Asset Viewer • T. Bryan Mefford

</footer>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script src="script.js"></script>

</body>

</html>
